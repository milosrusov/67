<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Six Seven Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
        }

        #angle-display {
            font-size: 96px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        #emoji {
            font-size: 64px;
        }

        #bar-container {
            width: 280px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
        }

        #bar {
            height: 100%;
            width: 0%;
            background: #555;
            border-radius: 6px;
            transition: width 0.1s, background 0.2s;
        }

        #bar.near { background: #f0a500; }
        #bar.hit  { background: #00e676; }

        #label {
            font-size: 14px;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #status {
            font-size: 13px;
            color: #555;
        }

        #permission-btn {
            padding: 12px 28px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #f0a500;
            color: #000;
            cursor: pointer;
            font-weight: 600;
        }
        #permission-btn:hover { background: #ffc107; }

        #clap-container {
            visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 32px;
            height: 100px;
        }
        #clap-container.active { visibility: visible; }

        .hand-left {
            font-size: 80px;
            display: inline-block;
            animation: hand-up-down 0.4s ease-in-out infinite alternate;
        }
        .hand-right {
            font-size: 80px;
            display: inline-block;
            transform: scaleX(-1);
            animation: hand-up-down 0.4s ease-in-out infinite alternate-reverse;
        }

        @keyframes hand-up-down {
            from { transform: translateY(0px); }
            to   { transform: translateY(-30px); }
        }
        .hand-right {
            animation-name: hand-up-down-mirror;
        }
        @keyframes hand-up-down-mirror {
            from { transform: scaleX(-1) translateY(0px); }
            to   { transform: scaleX(-1) translateY(-30px); }
        }
    </style>
</head>
<body>
    <div id="start-screen" style="display:flex;flex-direction:column;align-items:center;gap:20px;">
        <div style="font-size:22px;font-weight:700;">Six Seven Tracker</div>
        <button id="start-btn" style="padding:14px 32px;font-size:18px;border:none;border-radius:10px;background:#f0a500;color:#000;cursor:pointer;font-weight:700;">Start</button>
    </div>

    <div id="main-screen" style="display:none;flex-direction:column;align-items:center;gap:24px;">
        <div id="clap-container">
            <span class="hand hand-left">🫴</span>
            <span class="hand hand-right">🫴</span>
        </div>
        <div id="angle-display">--°</div>
        <div id="bar-container"><div id="bar"></div></div>
        <div id="status">Tilt your phone</div>
    </div>
    <div id="debug" style="font-size:11px;color:#444;text-align:center;line-height:1.8;"></div>

    <script>
        const angleDisplay = document.getElementById('angle-display');
        const clapContainer = document.getElementById('clap-container');
        const bar = document.getElementById('bar');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const mainScreen = document.getElementById('main-screen');

        let wasAt67 = false;
        const synth = window.speechSynthesis;

        function speak67() {
            synth.cancel();
            const utt = new SpeechSynthesisUtterance('six seven');
            utt.lang = 'en-US';
            utt.rate = 0.7;
            utt.pitch = 1.1;
            synth.speak(utt);
        }

        function stopSpeech() {
            synth.cancel();
        }

        function onOrientation(e) {
            const raw = e.beta;
            if (raw === null) return;

            const angle = Math.abs(raw);
            const clamped = Math.min(angle, 90);

            angleDisplay.textContent = Math.floor(angle) + '°';

            const diff = Math.abs(angle - 67);
            const isAt67 = angle >= 67.0 && angle < 68.0;
            const isNear = diff < 5;

            bar.style.width = (clamped / 90 * 100) + '%';
            bar.className = isAt67 ? 'hit' : isNear ? 'near' : '';

            clapContainer.classList.toggle('active', isAt67);
            statusEl.textContent = isAt67
                ? '67°!'
                : 'Tilt your phone';

            if (isAt67 && !wasAt67) speak67();
            if (!isAt67 && wasAt67) stopSpeech();
            wasAt67 = isAt67;
        }

        function startListening() {
            window.addEventListener('deviceorientation', onOrientation);
        }

        function launch() {
            // warm up speech synthesis with silent utterance — unlocks audio context
            const warmup = new SpeechSynthesisUtterance('');
            synth.speak(warmup);

            startScreen.style.display = 'none';
            mainScreen.style.display = 'flex';

            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS 13+
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        startListening();
                    } else {
                        statusEl.textContent = 'Permission denied.';
                    }
                });
            } else {
                startListening();
            }
        }

        startBtn.addEventListener('click', launch);

        // Detect Instagram/Facebook in-app browser
        const ua = navigator.userAgent || '';
        const isInAppBrowser = /Instagram|FBAN|FBAV/.test(ua);
        if (isInAppBrowser) {
            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#f0a500;color:#000;text-align:center;padding:14px 16px;font-size:14px;font-weight:700;z-index:999;line-height:1.5;';
            banner.innerHTML = 'Open in Chrome for this to work<br><span style="font-weight:400;font-size:12px;">Tap ··· → Open in browser</span>';
            document.body.prepend(banner);
        }
    </script>
</body>
</html>
